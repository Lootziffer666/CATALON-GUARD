name: Android Build

on:
  push:
    branches:
      - claude/unified-llm-android-app-al3ZQ
      - main
    paths:
      - 'Android/CatalonGuard/**'
  pull_request:
    paths:
      - 'Android/CatalonGuard/**'
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('Android/CatalonGuard/**/*.gradle.kts', 'Android/CatalonGuard/gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        working-directory: Android/CatalonGuard
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: catalon-guard-debug-${{ github.sha }}
          path: Android/CatalonGuard/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Build Release APK (unsigned)
        working-directory: Android/CatalonGuard
        run: ./gradlew assembleRelease
        continue-on-error: true

      - name: Upload Release APK (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: catalon-guard-release-unsigned-${{ github.sha }}
          path: Android/CatalonGuard/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 14
        continue-on-error: true

      - name: Run Unit Tests
        working-directory: Android/CatalonGuard
        run: ./gradlew test

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.sha }}
          path: Android/CatalonGuard/app/build/reports/tests/
          retention-days: 7

      - name: APK Info
        if: success()
        working-directory: Android/CatalonGuard
        run: |
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            SIZE=$(du -sh "$APK_PATH" | cut -f1)
            echo "✅ Debug APK built successfully"
            echo "📦 Size: $SIZE"
            echo "📁 Path: $APK_PATH"
          fi
